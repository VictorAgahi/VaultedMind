apiVersion: v1
kind: Namespace
metadata:
  name: argocd-image-updater
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd-image-updater
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-image-updater
rules:
- apiGroups:
  - argoproj.io
  resources:
  - applications
  - appprojects
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-image-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-image-updater
subjects:
- kind: ServiceAccount
  name: argocd-image-updater
  namespace: argocd-image-updater
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd-image-updater
data:
  registries.conf: |
    registries:
    - name: ghcr
      api_url: https://ghcr.io
      ping: yes
      insecure: no
      credentials: secret:argocd-image-updater/ghcr-creds#creds
  log.level: info
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-creds
  namespace: argocd-image-updater
type: Opaque
stringData:
  creds: |
    username: victoragahi
    password: # Add your GitHub Personal Access Token with read:packages scope
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-image-updater
  namespace: argocd-image-updater
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-image-updater
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-image-updater
    spec:
      serviceAccountName: argocd-image-updater
      containers:
      - name: argocd-image-updater
        image: quay.io/argoproj-labs/argocd-image-updater:v0.14.4
        imagePullPolicy: IfNotPresent
        args:
        - argocd-image-updater
        - --interval=2m
        - --kubeconfig=
        - --argocd-server-addr=argocd-server.argocd
        - --argocd-insecure=false
        - --argocd-plaintext=false
        env:
        - name: ARGOCD_IMAGE_UPDATER_LOGLEVEL
          value: info
        volumeMounts:
        - name: config
          mountPath: /etc/argocd/image-updater/registries.conf
          subPath: registries.conf
      volumes:
      - name: config
        configMap:
          name: argocd-image-updater-config
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-image-updater
  namespace: argocd-image-updater
spec:
  ports:
  - name: metrics
    port: 8888
    protocol: TCP
    targetPort: 8888
  selector:
    app.kubernetes.io/name: argocd-image-updater
