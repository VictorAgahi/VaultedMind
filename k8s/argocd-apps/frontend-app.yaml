apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-frontend
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: vault-frontend=ghcr.io/victoragahi/vault-frontend
    argocd-image-updater.argoproj.io/vault-frontend.update-strategy: semver
    argocd-image-updater.argoproj.io/vault-frontend.allow-tags: regexp:^[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/vault-frontend.update-method: kustomize
    argocd-image-updater.argoproj.io/vault-frontend.kustomize-image-name: vault-frontend
spec:
  project: default
  source:
    repoURL: https://github.com/VictorAgahi/VaultedBack
    targetRevision: main
    path: k8s/services/frontend/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
