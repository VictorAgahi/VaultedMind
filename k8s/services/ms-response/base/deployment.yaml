apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-response
  labels:
    app: ms-response
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ms-response
  template:
    metadata:
      labels:
        app: ms-response
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate-ms-response
          image: victorcra/masterquizz-ms-response:1.0.0
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "50m"
              memory: "128Mi"
          command: ["/bin/sh", "-c"]
          args:
            - |
              node -e "const net = require('net'); const s = () => { const c = net.createConnection(process.env.POSTGRES_PORT, process.env.POSTGRES_HOST).on('connect', () => process.exit(0)).on('error', () => { console.log('waiting for postgres...'); setTimeout(s, 2000); }); }; s();" && \
              node -e "const { Client } = require('pg'); const c = new Client({ host: process.env.POSTGRES_HOST, user: process.env.POSTGRES_USER, password: process.env.POSTGRES_PASSWORD, database: 'ms_response_db' }); c.connect().then(() => c.query('CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"; CREATE TABLE IF NOT EXISTS response (id uuid PRIMARY KEY DEFAULT uuid_generate_v4(), participant_id uuid NOT NULL, question_id uuid NOT NULL, session_id uuid NOT NULL, choice_id uuid NULL, is_correct boolean NULL, submitted_at TIMESTAMP NOT NULL DEFAULT now()); CREATE TABLE IF NOT EXISTS processed_events (id character varying NOT NULL, topic character varying NOT NULL, \"processedAt\" TIMESTAMP NOT NULL DEFAULT now(), CONSTRAINT \"PK_processed_events\" PRIMARY KEY (id));')).then(() => { console.log('Manual migration success'); process.exit(0); }).catch(e => { console.error(e); process.exit(1); })"
          envFrom:
            - configMapRef:
                name: global-config
          env:
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
            - name: POSTGRES_DB
              value: "ms_response_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: VALKEY_ENABLED
              value: "false"
            - name: KAFKA_ENABLED
              value: "false"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: ms-response
          image: victorcra/masterquizz-ms-response:1.0.0
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          command: ["/bin/sh", "-c"]
          args:
            - "node packages/ms-response/src/index.js"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: global-config
          env:
            - name: PORT
              value: "3000"
            - name: SESSION_SERVICE_URL
              value: "http://ms-session"
            - name: QUIZZ_SERVICE_URL
              value: "http://ms-quizz-management"
            - name: POSTGRES_DB
              value: "ms_response_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: VALKEY_ENABLED
              value: "true"
            - name: KAFKA_ENABLED
              value: "true"
            - name: AUTH_INTERNAL_PRIVATE_KEY_PATH
              value: "/app/keys/internal-private.pem"
            - name: AUTH_INTERNAL_PUBLIC_KEY_PATH
              value: "/app/keys/internal-public.pem"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
            - name: OTEL_SERVICE_NAME
              value: "ms-response"
          volumeMounts:
            - name: auth-keys
              mountPath: "/app/keys"
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: auth-keys
          secret:
            secretName: masterquizz-auth-keys
            items:
              - key: access_private.pem
                path: access-private.pem
              - key: access_public.pem
                path: access-public.pem
              - key: refresh_private.pem
                path: refresh-private.pem
              - key: refresh_public.pem
                path: refresh-public.pem
              - key: internal_private.pem
                path: internal-private.pem
              - key: internal_public.pem
                path: internal-public.pem
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ms-response
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: ms-response
