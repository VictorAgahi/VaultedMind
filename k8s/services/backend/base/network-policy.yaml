apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
spec:
  podSelector:
    matchLabels:
      app: vault-backend
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 3000
    # Allow traffic from any pod (Ingress, Frontend, etc.) to the API port.
    # Authentication and Cloudflare WAF provide the actual access control.
