apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-backend
  namespace: vault-prod
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-backend
  template:
    metadata:
      labels:
        app: vault-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      imagePullSecrets:
        - name: ghcr-login
      initContainers:
      - name: migrations
        image: ghcr.io/victoragahi/vault-backend:ec3ea3904160c8308571da54d3763b86360879a4
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        command: ['sh', '-c', 'node dist/scripts/typeorm.js migration:run -d dist/database/data-source.js']
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: DB_NAME
          value: vaultedmind_db
      containers:
      - name: backend
        image: ghcr.io/victoragahi/vault-backend:ec3ea3904160c8308571da54d3763b86360879a4
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: DB_NAME
          value: vaultedmind_db
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: vault-backend-secret
              key: jwt-secret
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: vault-backend-secret
              key: encryption-key
        - name: VAPID_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: vault-backend-secret
              key: vapid-public-key
        - name: VAPID_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: vault-backend-secret
              key: vapid-private-key
        - name: VAPID_EMAIL
          valueFrom:
            secretKeyRef:
              name: vault-backend-secret
              key: vapid-email
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vault-backend-secret
              key: openai-api-key
        - name: OPENAI_MODEL
          value: "gpt-5.6-sol"
        - name: OPENAI_ANALYSIS_MODEL
          value: "gpt-5.6-sol"
        - name: OPENAI_CORRELATION_MODEL
          value: "gpt-5.6-sol"
        - name: OPENAI_CONTEXT_MODEL
          value: "gpt-5.6-sol"
        - name: OPENAI_PREDICTION_MODEL
          value: "gpt-5.6-sol"
        - name: OPENAI_QUALITY_MODEL
          value: "gpt-5.6-sol"
        - name: OPENAI_SYNTHESIS_MODEL
          value: "gpt-5.6-sol"
        - name: OPENAI_REASONING_EFFORT
          value: "max"
        - name: OPENAI_PRO_MODE
          value: "true"
        - name: COOKIE_DOMAIN
          value: ".cyrus-ag.com"
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
