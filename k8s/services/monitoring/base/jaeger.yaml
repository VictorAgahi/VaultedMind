apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "16686"
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.56
          env:
            - name: SPAN_STORAGE_TYPE
              value: "elasticsearch"
            - name: ES_SERVER_URLS
              value: "http://opensearch-service:9200"
            - name: ES_USERNAME
              value: "admin"
            - name: ES_PASSWORD
              value: "MasterQuizz123!"
            - name: ES_TLS_ENABLED
              value: "false"
          ports:
            - containerPort: 16686
              name: query
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-service
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: query
      port: 16686
      targetPort: 16686
      nodePort: 30005
