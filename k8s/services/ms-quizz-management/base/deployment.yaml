apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-quizz-management
  labels:
    app: ms-quizz-management
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ms-quizz-management
  template:
    metadata:
      labels:
        app: ms-quizz-management
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate-ms-quizz
          image: victorcra/masterquizz-ms-quizz-management:1.0.0
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "50m"
              memory: "128Mi"
          command: ["/bin/sh", "-c"]
          args:
            - |
              node -e "const net = require('net'); const s = () => { const c = net.createConnection(process.env.POSTGRES_PORT, process.env.POSTGRES_HOST).on('connect', () => process.exit(0)).on('error', () => { console.log('waiting for postgres...'); setTimeout(s, 2000); }); }; s();" && node packages/ms-quizz-management/src/run-migrations.js
          envFrom:
            - configMapRef:
                name: global-config
          env:
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
            - name: POSTGRES_DB
              value: "ms_quizz_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: KAFKA_ENABLED
              value: "false"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: ms-quizz-management
          image: victorcra/masterquizz-ms-quizz-management:1.0.0
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          command: ["/bin/sh", "-c"]
          args:
            - "node packages/ms-quizz-management/src/index.js"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /metrics
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: global-config
          env:
            - name: PORT
              value: "3000"
            - name: POSTGRES_DB
              value: "ms_quizz_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: VALKEY_ENABLED
              value: "true"
            - name: KAFKA_ENABLED
              value: "true"
            - name: AUTH_INTERNAL_PUBLIC_KEY_PATH
              value: "/app/keys/internal-public.pem"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
            - name: OTEL_SERVICE_NAME
              value: "ms-quizz-management"
          volumeMounts:
            - name: auth-keys
              mountPath: "/app/keys"
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: auth-keys
          secret:
            secretName: masterquizz-auth-keys
            items:
              - key: access_private.pem
                path: access-private.pem
              - key: access_public.pem
                path: access-public.pem
              - key: refresh_private.pem
                path: refresh-private.pem
              - key: refresh_public.pem
                path: refresh-public.pem
              - key: internal_private.pem
                path: internal-private.pem
              - key: internal_public.pem
                path: internal-public.pem
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ms-quizz-management
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: ms-quizz-management
