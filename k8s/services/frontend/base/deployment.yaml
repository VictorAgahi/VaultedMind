apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-frontend
  namespace: vault-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vault-frontend
  template:
    metadata:
      labels:
        app: vault-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      imagePullSecrets:
        - name: ghcr-login
      containers:
      - name: frontend
        image: ghcr.io/victoragahi/vault-frontend:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_ENV
          value: production
        - name: NEXT_PUBLIC_BACKEND_URL
          value: "https://api.vault-mind.cyrus-ag.com"
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: next-cache
          mountPath: /app/.next/cache
      volumes:
      - name: next-cache
        emptyDir: {}
