apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-frontend
  namespace: vault-prod
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - app.example.com  # CHANGE THIS TO YOUR ACTUAL DOMAIN
    secretName: vault-frontend-tls
  rules:
  - host: app.example.com  # CHANGE THIS TO YOUR ACTUAL DOMAIN
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vault-frontend
            port:
              number: 3000
