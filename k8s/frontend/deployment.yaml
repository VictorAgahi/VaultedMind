apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-frontend
  namespace: vault-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vault-frontend
  template:
    metadata:
      labels:
        app: vault-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/victoragahi/vault-frontend:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_ENV
          value: production
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
