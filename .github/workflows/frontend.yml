name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vault-front/**'
      - '.github/workflows/frontend.yml'
      - 'frontend.Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vault-front/**'
      - 'frontend.Dockerfile'
      - 'docker-compose.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    name: Lint & Build Frontend
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vault-front/package-lock.json

      - name: Install dependencies
        working-directory: vault-front
        run: npm ci

      - name: Lint
        working-directory: vault-front
        run: npm run lint

      - name: Build
        working-directory: vault-front
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: prepare
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.prepare.outputs.owner }}/vault-frontend:latest
            ghcr.io/${{ steps.prepare.outputs.owner }}/vault-frontend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.prepare.outputs.owner }}/vault-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.prepare.outputs.owner }}/vault-frontend:buildcache,mode=max

      - name: Update manifest image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i 's|image: ghcr.io/.*/vault-frontend:.*|image: ghcr.io/${{ steps.prepare.outputs.owner }}/vault-frontend:${{ github.sha }}|g' k8s/services/frontend/base/deployment.yaml

      - name: Commit and push updated manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/services/frontend/base/deployment.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(k8s): update frontend image to ${{ github.sha }}" && git pull --rebase origin main && git push origin main)

