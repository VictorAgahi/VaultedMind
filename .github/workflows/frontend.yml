name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vault-front/**'
      - '.github/workflows/frontend.yml'
      - 'frontend.Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vault-front/**'
      - 'frontend.Dockerfile'
      - 'docker-compose.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    name: Lint & Build Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vault-front/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: vault-front
        run: npm ci

      - name: Lint
        working-directory: vault-front
        run: npm run lint

      - name: Build
        working-directory: vault-front
        run: npm run build

  build-docker:
    needs: lint-and-build
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend.Dockerfile
          push: false
          tags: vault-frontend:${{ github.sha }}
          cache-from: type=registry,ref=vault-frontend:latest
          cache-to: type=inline

      - name: Verify Docker build
        run: |
          echo "Docker image built successfully"
          echo "Build tag: vault-frontend:${{ github.sha }}"
