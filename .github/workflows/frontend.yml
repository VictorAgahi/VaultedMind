name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vault-front/**'
      - '.github/workflows/frontend.yml'
      - 'frontend.Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vault-front/**'
      - 'frontend.Dockerfile'
      - 'docker-compose.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    name: Lint & Build Frontend
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vault-front/package-lock.json

      - name: Install dependencies
        working-directory: vault-front
        run: npm ci

      - name: Lint
        working-directory: vault-front
        run: npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: prepare
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.prepare.outputs.owner }}/vault-frontend:latest
            ghcr.io/${{ steps.prepare.outputs.owner }}/vault-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes deployment image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git checkout main || git checkout -b main
          sed -i -E 's|(image:\s*ghcr\.io/[a-zA-Z0-9_-]+/vault-frontend):.*|\1:'"${{ github.sha }}"'|g' k8s/services/frontend/base/deployment.yaml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/services/frontend/base/deployment.yaml
          git commit -m "chore(deploy): update frontend image tag to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git pull origin main --rebase
          git push origin main



