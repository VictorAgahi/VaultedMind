name: Backend E2E Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vaultedMind/**'
      - '.github/workflows/backend-e2e.yml'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vaultedMind/**'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests with Docker Compose

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vaultedmind_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: vaultedMind/yarn.lock

      - name: Install dependencies
        working-directory: vaultedMind
        run: yarn install --frozen-lockfile

      - name: Build application
        working-directory: vaultedMind
        run: yarn build

      - name: Run E2E tests with setup
        working-directory: vaultedMind
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: vaultedmind_test
          NODE_ENV: test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SERVICE_PORT: 3001
        run: yarn test:e2e:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: vaultedMind/coverage/
          retention-days: 7
