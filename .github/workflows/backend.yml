name: Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vaultedMind/**'
      - '.github/workflows/backend.yml'
      - 'backend.Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vaultedMind/**'
      - 'backend.Dockerfile'
      - 'docker-compose.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    name: Lint & Build Backend

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: vaultedMind/yarn.lock

      - name: Install dependencies
        working-directory: vaultedMind
        run: yarn install --frozen-lockfile

      - name: Lint
        working-directory: vaultedMind
        run: yarn lint

      - name: Build
        working-directory: vaultedMind
        run: yarn build

      - name: Run unit tests
        if: always()
        working-directory: vaultedMind
        run: yarn test:unit

  e2e-tests:
    needs: lint-and-build
    runs-on: ubuntu-latest
    name: E2E Tests

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vaultedmind_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: vaultedMind/yarn.lock

      - name: Install dependencies
        working-directory: vaultedMind
        run: yarn install --frozen-lockfile

      - name: Build application
        working-directory: vaultedMind
        run: yarn build

      - name: Run E2E tests with setup
        working-directory: vaultedMind
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: vaultedmind_test
          NODE_ENV: test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SERVICE_PORT: 3000
        run: yarn test:e2e:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-coverage
          path: vaultedMind/coverage/
          retention-days: 7

  build-docker:
    needs: [lint-and-build, e2e-tests]
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/vault-backend:latest
            ghcr.io/${{ github.repository }}/vault-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/vault-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/vault-backend:buildcache,mode=max
