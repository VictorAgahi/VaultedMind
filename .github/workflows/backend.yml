name: Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vaultedMind/**'
      - '.github/workflows/backend.yml'
      - 'backend.Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vaultedMind/**'
      - 'backend.Dockerfile'
      - 'docker-compose.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    name: Lint & Build Backend

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: vaultedMind/yarn.lock

      - name: Install dependencies
        working-directory: vaultedMind
        run: yarn install --frozen-lockfile

      - name: Lint
        working-directory: vaultedMind
        run: yarn lint

      - name: Build
        working-directory: vaultedMind
        run: yarn build

  build-docker:
    needs: lint-and-build
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/vault-backend:latest
            ghcr.io/${{ github.repository }}/vault-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/vault-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/vault-backend:buildcache,mode=max
